name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Smoke tests
        run: bash tests/run.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Format
        run: cargo fmt --manifest-path captain/harnesses/rust-harness/Cargo.toml --all --check
      - name: Clippy
        run: cargo clippy --manifest-path captain/harnesses/rust-harness/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Rust tests
        run: cargo test --manifest-path captain/harnesses/rust-harness/Cargo.toml
